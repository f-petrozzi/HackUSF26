version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: caremesh
      POSTGRES_PASSWORD: caremesh
      POSTGRES_DB: caremesh
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caremesh"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://caremesh:caremesh@db:5432/caremesh
    volumes:
      - ./apps/api:/app
      - garmin_tokens:/app/garmin_tokens
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

  specialist-student:
    build:
      context: ./services/remote_specialists/student_support
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: gemini-2.0-flash
      API_BASE_URL: http://api:8000
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/.well-known/agent.json || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  specialist-caregiver:
    build:
      context: ./services/remote_specialists/caregiver_burnout
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: gemini-2.0-flash
      API_BASE_URL: http://api:8000
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8002/.well-known/agent.json || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  garmin_tokens:
